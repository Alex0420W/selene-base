name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system GIS libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev proj-bin libproj-dev libgeos-dev

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest --cov=selene_base --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  pipeline-smoke:
    name: Pipeline smoke test on sample data
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    # The sample-data release asset must exist before this job can pass.
    # Until the maintainer publishes the sample-data-v1 release, this job
    # is expected to fail at the `selene download --sample` step. That
    # failure is what tells the maintainer to publish the asset; keeping
    # the job in CI prevents pipeline regressions silently slipping past.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system GIS libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev proj-bin libproj-dev libgeos-dev

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download sample data
        run: selene download --sample

      - name: Run pipeline
        run: |
          selene preprocess
          selene score
          selene rank --top-n 20
          selene validate
          selene compare

      - name: Verify outputs
        run: |
          test -s data/outputs/score_southpole.tif
          test -s data/outputs/top_sites.geojson
          test -s data/outputs/validation.json
          test -s data/outputs/comparison.json
          python - <<'PY'
          import json
          d = json.load(open("data/outputs/validation.json"))
          assert "per_region" in d, "validation.json missing per_region"
          assert len(d["per_region"]) == 9, f"expected 9 regions, got {len(d['per_region'])}"
          assert "sites_within_any_region" in d
          c = json.load(open("data/outputs/comparison.json"))
          assert "criteria" in c and len(c["criteria"]) >= 1
          print("validation.json + comparison.json pass schema check")
          PY

      - name: Upload pipeline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            data/outputs/score_southpole.tif
            data/outputs/top_sites.geojson
            data/outputs/validation.json
            data/outputs/comparison.json
          if-no-files-found: ignore
