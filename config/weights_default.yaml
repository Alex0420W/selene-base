# selene-base default weights (v2.2 — PGV-style seismic kernel replaces distance-to-scarp).
#
# Eight criteria contribute to the aggregate score:
# illumination, multi_volatile, eva_psr_access, los_to_earth, slope, thermal, hazard, pgv_seismic.
#
# v2.2 swaps the v1.8 distance-to-nearest-scarp seismic criterion (logistic
# at d_safe = 50 km) for a per-cell PGV-style attenuation kernel: each
# scarp contributes exp(-d/L) at L = 50 km, summed over all scarps within
# 5L = 250 km cutoff. Mirrors Watters 2024 PSJ's Mw 5.3 strong-shaking
# distance and surfaces multi-scarp-cluster exposure that v1.8's
# distance-to-nearest collapsed.
#
# v2.1 swapped the single ``ice`` criterion for the three-class
# **multi_volatile** criterion (H₂O <110 K, CO₂/NH₃ <66 K, ultra-cold
# <60 K) inside the 2 km walking-EVA disc.
#
# v2.0 swapped the v1.x global spatial-coupling product for per-cell
# EVA-disc PSR access at the same 0.17 weight slot.
#
# **Weight slots are unchanged across all three v2.x swaps** — each new
# criterion sits in the slot v1.x's ``coupling`` (0.17), ``ice`` (0.17),
# and ``seismic`` (0.10) originally held, so any catalog-level shift
# attributable to any swap reflects the new criterion's geometry, not a
# moved weight on the simplex.
#
# Why 0.10 for pgv_seismic (unchanged from v1.8 seismic):
# Scarp distance is one of multiple safety factors and is most relevant
# on long habitat-occupation timescales (Civilini et al. 2023's
# relocated-moonquake-to-scarp clustering distance is order 10-50 km,
# with epicentral uncertainty ~10 km, so the criterion influences
# multi-km site selection without dominating it).
#
# Why 0.15 for los_to_earth (unchanged ratio from v1.1.0):
# - Real physical criterion NASA prioritises in actual mission planning.
# - More binary-ish than continuous, so weighted slightly less than
#   illumination/multi_volatile/eva_psr_access.
#
# This vector was chosen on physics-and-operations grounds, not by
# fitting to validation data. Older vectors are preserved:
#   config/weights_legacy.yaml      — five criteria (no coupling, no LOS).
#   config/weights_legacy_v6.yaml   — six criteria (no LOS).
# The v1.8 vector (coupling + ice + distance-to-nearest seismic) is the
# v2.2 vector with eva_psr_access → coupling, multi_volatile → ice, and
# pgv_seismic → seismic.

illumination: 0.17
multi_volatile: 0.17
eva_psr_access: 0.17
los_to_earth: 0.14
slope: 0.12
thermal: 0.07
hazard: 0.06
pgv_seismic: 0.10
