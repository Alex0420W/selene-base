# selene-base default weights (week 9+).
#
# Adds the los_to_earth criterion (Earth line-of-sight visibility
# fraction over the libration cycle) as the seventh criterion.
#
# Why 0.15 for los_to_earth:
# - It is a real physical criterion NASA prioritises in actual mission
#   planning (above thermal and hazard for crewed-comms-critical sites).
# - It is not as high-leverage as illumination/ice/coupling because it
#   is a more binary-ish constraint (works/doesn't work given a horizon)
#   than a continuous optimisation target.
# - 0.15 places it between hazard (mostly redundant with slope at the
#   south pole) and slope (a hard buildability constraint).
#
# This weight was chosen BEFORE the week-9 validation rerun on
# physics-and-operations grounds, not after seeing the result.
#
# Other criteria renormalised so the simplex sums to 1.00. The week 7-8
# (six-criterion, no LOS) weight vector is preserved as
# config/weights_legacy_v6.yaml.

illumination: 0.18
ice: 0.18
coupling: 0.18
los_to_earth: 0.15
slope: 0.13
thermal: 0.08
hazard: 0.07
seismic: 0.03
